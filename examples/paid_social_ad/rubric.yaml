name: paid_social_ad_quality
version: 0.1
artifact_type: paid_social_ad
description: Starter rubric for short-form paid social ad copy.
dimensions:
  - name: primary_text_length
    evaluator: logic
    description: Primary text should be concise for social placement scanning.
    field: primary_text
    rule: max_chars
    threshold: 280

  - name: has_cta
    evaluator: logic
    description: Ad copy should include a clear next action.
    field: primary_text
    rule: contains_cta

  - name: audience_fit
    evaluator: llm_judge
    description: The ad directly addresses the intended customer and their job-to-be-done.
    field: primary_text
    requires_human_review: true
